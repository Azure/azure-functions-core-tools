services:
  func-cli:
    build:
      context: ../..  # Go up two levels to repo root
      dockerfile: .devcontainer/run/Dockerfile
      args:
        TARGET_RUNTIME: linux-x64
        EXECUTABLE_NAME: func
        BASE_IMAGE: mcr.microsoft.com/dotnet/sdk:8.0
        RUNTIME_IMAGE: mcr.microsoft.com/dotnet/runtime:8.0
    container_name: func-cli
    stdin_open: true
    tty: true
