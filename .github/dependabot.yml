version: 2

# Grouping strategy:
# - Each ecosystem produces ONE PR for all minor + patch updates per week.
# - Major version bumps stay as individual PRs so they can be reviewed and
#   merged on their own (they often require code changes or coordination).
# - A few NuGet sub-groups stay separate (workers, microsoft-bcl,
#   opentelemetry) because they want to be bumped together regardless of
#   semver level.
# - Security updates are surfaced via the Security tab regardless of
#   grouping; the weekly cadence here is for routine version drift PRs.

updates:
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    # Worker packages and the host package are pinned to versions that ship
    # together with the Functions host. They must be bumped manually as a
    # set, so dependabot should never open PRs for them.
    ignore:
      - dependency-name: "Microsoft.Azure.Functions.JavaWorker"
      - dependency-name: "Microsoft.Azure.Functions.NodeJsWorker"
      - dependency-name: "Microsoft.Azure.Functions.PowerShellWorker.*"
      - dependency-name: "Microsoft.Azure.Functions.PythonWorker"
      - dependency-name: "Microsoft.Azure.WebJobs.Script.WebHost"
      # These packages are transitive dependencies of the host and must stay
      # pinned to the versions that ship with it. Only bump them when the
      # host version is upgraded.
      - dependency-name: "Azure.Identity"
      - dependency-name: "Azure.Security.KeyVault.Secrets"
      - dependency-name: "Microsoft.Identity.Client"
      # We intentionally stay on Microsoft.ApplicationInsights 2.x and do
      # not plan to move to v3.
      - dependency-name: "Microsoft.ApplicationInsights"
        update-types:
          - "version-update:semver-major"
    groups:
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
          - "Azure.Monitor.OpenTelemetry.*"
      # BCL/runtime packages are versioned together (e.g. .NET 9 -> 10);
      # group all semver levels.
      microsoft-bcl:
        patterns:
          - "Microsoft.Extensions.*"
          - "System.*"
      # Catch-all: every remaining NuGet package, minor + patch only.
      # Major bumps fall through and get individual PRs.
      nuget-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/eng/tools/publish-tools/npm"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/eng/tools/publish-tools"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 5
    groups:
      pip-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 5
    groups:
      docker-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
