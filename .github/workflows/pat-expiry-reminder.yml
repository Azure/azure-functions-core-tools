name: PAT Expiry Reminder

# Runs monthly to remind maintainers to check/renew the AZURE_DOCS_REPO_PAT
# before it expires. Opens a GitHub Issue 30 days before expiry.

on:
  schedule:
    # Run every Monday at 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  # Set this to the PAT expiration date (ISO 8601).
  # Update this value each time the PAT is renewed.
  PAT_EXPIRY_DATE: "2026-04-18"
  DAYS_WARN_BEFORE: 30

jobs:
  check-expiry:
    name: Check PAT expiry
    runs-on: ubuntu-latest
    steps:
      - name: Check if PAT is expiring soon
        id: check
        run: |
          EXPIRY="${{ env.PAT_EXPIRY_DATE }}"
          WARN_DAYS="${{ env.DAYS_WARN_BEFORE }}"

          EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

          echo "days_left=$DAYS_LEFT" >> "$GITHUB_OUTPUT"
          echo "expiry_date=$EXPIRY" >> "$GITHUB_OUTPUT"

          if [ "$DAYS_LEFT" -le 0 ]; then
            echo "status=expired" >> "$GITHUB_OUTPUT"
            echo "::error::AZURE_DOCS_REPO_PAT has EXPIRED ($EXPIRY)"
          elif [ "$DAYS_LEFT" -le "$WARN_DAYS" ]; then
            echo "status=expiring" >> "$GITHUB_OUTPUT"
            echo "::warning::AZURE_DOCS_REPO_PAT expires in $DAYS_LEFT days ($EXPIRY)"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "PAT is valid for $DAYS_LEFT more days"
          fi

      - name: Open reminder issue
        if: steps.check.outputs.status == 'expiring' || steps.check.outputs.status == 'expired'
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ steps.check.outputs.status }}
          DAYS_LEFT: ${{ steps.check.outputs.days_left }}
          EXPIRY_DATE: ${{ steps.check.outputs.expiry_date }}
        run: |
          # Check if an open issue already exists to avoid duplicates
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "pat-expiry" \
            --state open \
            --json number \
            --jq 'length')

          if [ "$EXISTING" -gt 0 ]; then
            echo "Reminder issue already open — skipping"
            exit 0
          fi

          if [ "$STATUS" = "expired" ]; then
            TITLE="🚨 AZURE_DOCS_REPO_PAT has EXPIRED"
            URGENCY="**The PAT expired on ${EXPIRY_DATE}.** The doc-sync workflow will fail until it is renewed."
            LABELS="pat-expiry,priority:high"
          else
            TITLE="⚠️ AZURE_DOCS_REPO_PAT expires in ${DAYS_LEFT} days"
            URGENCY="The PAT expires on **${EXPIRY_DATE}** (${DAYS_LEFT} days from now)."
            LABELS="pat-expiry"
          fi

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --label "$LABELS" \
            --body "## PAT Renewal Required

          ${URGENCY}

          ### What is this?

          The \`AZURE_DOCS_REPO_PAT\` secret is used by the [doc-sync workflow](${{ github.server_url }}/${{ github.repository }}/blob/main/.github/workflows/doc-sync.yml) to open documentation PRs in \`MicrosoftDocs/azure-docs-pr\` when CLI commands change.

          ### Steps to renew

          1. Go to [GitHub Developer Settings → Fine-grained tokens](https://github.com/settings/tokens?type=beta)
          2. Find or create a token with \`Contents: write\` + \`Pull requests: write\` on \`MicrosoftDocs/azure-docs-pr\`
          3. Set expiration to 6–12 months
          4. Copy the new token
          5. Go to [Repo Settings → Secrets → Actions](${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions)
          6. Update the \`AZURE_DOCS_REPO_PAT\` secret with the new token
          7. Update \`PAT_EXPIRY_DATE\` in \`.github/workflows/pat-expiry-reminder.yml\` to the new expiration date
          8. Close this issue

          ---
          *This issue was auto-generated by the [PAT expiry reminder workflow](${{ github.server_url }}/${{ github.repository }}/blob/main/.github/workflows/pat-expiry-reminder.yml).*"
