parameters:
- name: dependsOn
  type: string
  default: ''
- name: sign
  type: boolean
  default: false
- name: runtimes
  type: object
  default:
    - linux-arm64
    - linux-x64
    - osx-arm64
    - osx-x64
    - win-arm64
    - win-x64

jobs:
- job: Stage
  displayName: Stage packages
  ${{ if ne(parameters.dependsOn, '') }}:
    dependsOn: ${{ parameters.dependsOn }}

  variables:
    drop_path: $(Pipeline.Workspace)/drop
    release_path: $(Build.ArtifactStagingDirectory)/release

  templateContext:
    inputs:
    # TODO: fetch pdb's in a separate stage and upload to symbol server
    # IMPORTANT: DownloadArtifacts itemPattern behaves differently than normal file matching.
    # Exclude patterns are basically not supported.
    - input: pipelineArtifact
      targetPath: $(drop_path)
      artifactName: drop_cli
      itemPattern: |
        **/func
        **/func.exe
        **/install.ps1
        **/install.sh

    outputs:
    - output: pipelineArtifact
      targetPath: $(release_path)
      artifactName: release

  steps:
    - ${{ if eq(parameters.sign, true) }}:
      - task: UseDotNet@2 # ESRP doesn't yet support net10 SDK
        displayName: Install .NET 9 SDK (for esrp tool)
        inputs:
          packageType: sdk
          version: 9.x

      - template: /eng/ci/templates/steps/sign-app.yml@self
        parameters:
          platform: windows
          folderPath: $(drop_path)
          signPatterns: |
            **/win-*/func.exe
            install.ps1

      - task: CopyFiles@2
        displayName: Copy scripts
        inputs:
          SourceFolder: $(drop_path)
          Contents: |
            install.ps1
            install.sh
          TargetFolder: $(release_path)

      # macOS hardened runtime requires every loaded Mach-O to be signed. ESRP's MacAppDeveloperSign
      # requires the payload to be a .zip or .dmg, so we zip each osx-* rid folder, sign the zips,
      # then expand them back over the drop output.
      - pwsh: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path '$(drop_path)' '_macsign'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Get-ChildItem -Path '$(drop_path)' -Directory -Filter 'osx-*' | ForEach-Object {
            $payload = Get-ChildItem -Path $_.FullName -Exclude '*.pdb'
            $zip = Join-Path $stage "$($_.Name).zip"
            Compress-Archive -Path $payload -DestinationPath $zip -Force
            Write-Host "Zipped $($_.Name) -> $zip"
          }
        displayName: 'Package macOS runtimes for signing'

      - template: /eng/ci/templates/steps/sign-app.yml@self
        parameters:
          platform: macos
          folderPath: $(drop_path)/_macsign
          signPatterns: 'osx-*.zip'

      - pwsh: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path '$(drop_path)' '_macsign'
          Get-ChildItem -Path $stage -Filter 'osx-*.zip' | ForEach-Object {
            $rid = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
            $dest = Join-Path '$(drop_path)' $rid
            Remove-Item -Recurse -Force -Path $dest -ErrorAction SilentlyContinue
            Expand-Archive -Path $_.FullName -DestinationPath $dest -Force
            Write-Host "Restored signed $rid"
          }
          Remove-Item -Recurse -Force -Path $stage
        displayName: 'Restore signed macOS runtimes'

    # Archive all runtimes before Linux PGP signing. Linux PGP produces detached
    # signatures (.sig), so we sign the final .tar.gz archives rather than the
    # raw binaries.
    - ${{ each runtime in parameters.runtimes }}:

      - ${{ if not(startsWith(runtime, 'win')) }}:
        - pwsh: |
            $ErrorActionPreference = 'Stop'
            $dropDir = '$(drop_path)/${{ runtime }}'
            $archivePath = '$(release_path)/func-${{ runtime }}.tar.gz'
            New-Item -ItemType Directory -Path '$(release_path)' -Force | Out-Null

            $source = Get-Item "$dropDir/func"
            chmod +x "$dropDir/func"
            tar -czf $archivePath -C $dropDir func
            $archive = Get-Item $archivePath

            [PSCustomObject]@{ File = $source.Name; 'Size (MB)' = '{0:N2}' -f ($source.Length / 1MB) },
            [PSCustomObject]@{ File = $archive.Name; 'Size (MB)' = '{0:N2}' -f ($archive.Length / 1MB) } |
              Format-Table -AutoSize | Out-String | Write-Host
          displayName: 'Archive ${{ runtime }}'

      - ${{ if startsWith(runtime, 'win') }}:
        - pwsh: |
            $ErrorActionPreference = 'Stop'
            $dropDir = '$(drop_path)/${{ runtime }}'
            $archivePath = '$(release_path)/func-${{ runtime }}.zip'
            New-Item -ItemType Directory -Path '$(release_path)' -Force | Out-Null

            $source = Get-Item "$dropDir/func.exe"
            Compress-Archive -Path $source.FullName -DestinationPath $archivePath
            $archive = Get-Item $archivePath

            [PSCustomObject]@{ File = $source.Name; 'Size (MB)' = '{0:N2}' -f ($source.Length / 1MB) },
            [PSCustomObject]@{ File = $archive.Name; 'Size (MB)' = '{0:N2}' -f ($archive.Length / 1MB) } |
              Format-Table -AutoSize | Out-String | Write-Host
          displayName: 'Archive ${{ runtime }}'
