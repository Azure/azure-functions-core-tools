parameters:
- name: dependsOn
  type: string
  default: ''
- name: runtimes
  type: object
  default:
    - linux-arm64
    - linux-x64
    - osx-arm64
    - osx-x64
    - win-arm64
    - win-x64

jobs:
- job: Stage
  displayName: Stage packages
  ${{ if ne(parameters.dependsOn, '') }}:
    dependsOn: ${{ parameters.dependsOn }}

  variables:
    drop_path: $(Pipeline.Workspace)/drop

  templateContext:
    inputs:
    # TODO: fetch pdb's in a separate stage and upload to symbol server
    # IMPORTANT: DownloadArtifacts itemPattern behaves differently than normal file matching.
    # Exclude patterns are basically not supported.
    - input: pipelineArtifact
      targetPath: $(drop_path)
      artifactName: drop_cli
      itemPattern: |
        **/func
        **/func.exe

    outputs:
    - ${{ each runtime in parameters.runtimes }}:
      - output: universalPackages
        publishDirectory: $(drop_path)/${{ runtime }}
        vstsFeedPublish: public/pre-release
        vstsFeedPackagePublish: func-cli-${{ runtime }}
        versionOption: custom
        versionPublish: $(Build.BuildNumber)
        packagePublishDescription: 'Azure Functions CLI (${{ runtime }})'

