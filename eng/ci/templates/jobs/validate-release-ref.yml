jobs:
- job: Validate
  templateContext:
    type: validationJob

  steps:
  - pwsh: |
      $source = "$(Build.SourceBranch)"
      if (!($source -like "refs/tags/*-v*" || $source -like "refs/tags/v*" || $source -like "refs/heads/release/*" || $source -like "refs/heads/internal/release/*"))
      {
        Write-Host "##vso[task.logissue type=error]Invalid release branch. Branch must be a tag (v* or *-v*) or a release branch (release/*, internal/release/*)."
        exit 1
      }
    displayName: Validate Source Branch
