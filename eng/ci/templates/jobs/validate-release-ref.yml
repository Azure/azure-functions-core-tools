parameters:
- name: failOnInvalidRef
  displayName: Fail on Invalid Reference
  type: boolean
  default: true

jobs:
- job: Validate
  templateContext:
    type: validationJob

  steps:
  - checkout: none

  - pwsh: |
      $source = "$(Build.SourceBranch)"
      $validPatterns = @(
        'refs/tags/*/v*'
        'refs/tags/*-v*'
        'refs/tags/v*'
        'refs/heads/release/*'
        'refs/heads/internal/release/*'
      )

      $isValid = $validPatterns | Where-Object { $source -like $_ } | Select-Object -First 1
      if (-not $isValid) {
        $patternList = $validPatterns -join ', '
        $verbosity = if ('${{ parameters.failOnInvalidRef }}' -eq 'True') { 'error' } else { 'warning' }
        Write-Host "##vso[task.logissue type=$verbosity]Invalid release branch '$source'. Valid patterns: $patternList"
        if ($verbosity -eq 'error') {
          exit 1
        }
      }
    displayName: Validate Source Branch
