jobs:
- job: Linux_E2E_Test
  timeoutInMinutes: '180'
  displayName: 'E2E Test:'

  pool:
    name: 1es-pool-azfunc-public
    image: 1es-ubuntu-24.04-min
    os: linux

  strategy:
    matrix:
      dotnetIsolated_linux_x64:
        languageWorker: 'DotnetIsolated'
        runtime: 'linux-x64'
      node_linux_x64:
        languageWorker: 'Node'
        runtime: 'linux-x64'
      powershell_linux_x64:
        languageWorker: 'Powershell'
        runtime: 'linux-x64'
      python_linux_x64:
        languageWorker: 'Python'
        runtime: 'linux-x64'
      custom_linux_x64:
        languageWorker: 'Custom'
        runtime: 'linux-x64'
      go_linux_x64:
        languageWorker: 'Go'
        runtime: 'linux-x64'

  steps:
  - template: /eng/ci/templates/steps/install-tools.yml@self

  # The 1es-ubuntu-24.04-min image doesn't ship npm. NodeTool@0 in install-tools.yml
  # installs Node into the agent user's tool cache, but start-emulators.ps1 runs
  # `sudo npm install -g azurite` and sudo's PATH doesn't include the tool cache.
  # Install npm system-wide via apt so azurite can be installed and launched as root.
  - bash: |
      sudo apt-get update
      sudo apt-get install -y npm
      npm --version
    displayName: 'Install npm'

  - pwsh: ./eng/scripts/start-emulators.ps1
    displayName: 'Start emulators (NoWait)'

  - pwsh: |
      dotnet publish src/Cli/func/Azure.Functions.Cli.csproj `
        -c Release `
        -f net10.0 `
        -r $(runtime) `
        --self-contained `
        -o $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)
    displayName: 'Publish CLI ($(runtime))'

  - bash: |
      chmod +x $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)/func
    displayName: 'Make CLI binaries executable'

  - template: /eng/ci/templates/steps/run-e2e-tests.yml@self
    parameters:
      worker: $(languageWorker)
      runtime: $(runtime)
