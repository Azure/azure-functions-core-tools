parameters:
- name: projects
  type: string
- name: configuration
  type: string
  default: release
- name: artifacts
  type: object
  default: ['pack', 'publish']
- name: sign
  type: boolean
  default: false
- name: build_args
  type: string
  default: ''

jobs:
- job: build

  variables:
  - template: /eng/ci/templates/variables/build.yml@self
  - name: pack_dir
    readonly: true
    value: $(Build.ArtifactStagingDirectory)/pkg
  - name: publish_dir
    readonly: true
    value: $(Build.ArtifactStagingDirectory)/pub

  templateContext:
    outputParentDirectory: $(Build.ArtifactStagingDirectory)
    outputs:
    - output: pipelineArtifact
      displayName: Publish Packages
      path: $(pack_dir)
      artifact: drop_packages
    - output: pipelineArtifact
      displayName: Publish CLI
      path: $(publish_dir)
      artifact: drop_cli

  steps:
    - template: /eng/ci/templates/steps/setup-dependencies.yml@self

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: custom
        custom: restore
        projects: ${{ parameters.projects }}
        arguments: -v m ${{ parameters.build_args }}

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: ${{ parameters.projects }}
        arguments: -c ${{ parameters.configuration }} -v m --no-restore ${{ parameters.build_args }}

    - task: DotNetCoreCLI@2
      displayName: Unit tests
      inputs:
        command: test
        projects: ${{ parameters.projects }}
        arguments: -c ${{ parameters.configuration }} --no-build ${{ parameters.build_args }}

    - ${{ if eq(parameters.sign, true) }}:
      # We are publishing as single file, don't bother signing func cli yet
      - template: ci/sign-files.yml@eng
        parameters:
          displayName: Sign assemblies
          minimatch: true
          signType: dll-strong-name
          folderPath: out/bin
          pattern: |
            **/Azure.Functions.Cli*.dll
            !**/Azure.Functions.Cli*Test.dll
            !**/Azure.Functions.Cli*Tests.dll

    - ${{ if containsValue(parameters.artifacts, 'pack') }}:
      - task: DotNetCoreCLI@2
        displayName: Pack
        inputs:
          command: custom
          custom: pack
          projects: ${{ parameters.projects }}
          arguments: -c ${{ parameters.configuration }} -v m -o $(pack_dir) --no-build ${{ parameters.build_args }}

    - ${{ if containsValue(parameters.artifacts, 'publish') }}:
      - task: DotNetCoreCLI@2
        displayName: Publish All Runtimes
        inputs:
          command: custom
          custom: build
          projects: ${{ parameters.projects }}
          arguments: -c ${{ parameters.configuration }} -v m --no-restore -t:PublishAllRids -p:AllRuntimesPublishRoot=$(publish_dir) ${{ parameters.build_args }}

    - ${{ if and(containsValue(parameters.artifacts, 'pack'), eq(parameters.sign, true)) }}:
      - template: ci/sign-files.yml@eng
        parameters:
          displayName: Sign nuget packages
          signType: nuget
          folderPath: $(pack_dir)
          pattern: '*.nupkg'

    - ${{ if and(containsValue(parameters.artifacts, 'publish'), eq(parameters.sign, true)) }}:
      - template: /eng/ci/templates/steps/sign-app.yml@eng
        parameters:
          platform: windows
          folderPath: $(publish_dir)
          signPatterns: '**/win-*/func'

      - template: /eng/ci/templates/steps/sign-app.yml@eng
        parameters:
          platform: linux
          folderPath: $(publish_dir)
          signPatterns: '**/linux-*/func'

      - template: /eng/ci/templates/steps/sign-app.yml@eng
        parameters:
          platform: macos
          folderPath: $(publish_dir)
          signPatterns: '**/osx-*/func'
