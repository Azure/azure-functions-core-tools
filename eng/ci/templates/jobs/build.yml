parameters:
- name: projects
  type: string
- name: configuration
  type: string
  default: release
- name: artifacts
  type: object
  default: ['pack', 'publish']
- name: sign
  type: boolean
  default: false
- name: build_args
  type: string
  default: ''

jobs:
- job: build

  variables:
  - template: /eng/ci/templates/variables/build.yml@self
  - name: pack_dir
    readonly: true
    value: $(Build.ArtifactStagingDirectory)/pkg
  - name: publish_dir
    readonly: true
    value: $(Build.ArtifactStagingDirectory)/pub

  templateContext:
    outputParentDirectory: $(Build.ArtifactStagingDirectory)
    outputs:
    - ${{ if containsValue(parameters.artifacts, 'pack') }}:
      - output: pipelineArtifact
        displayName: Publish Packages
        path: $(pack_dir)
        artifact: drop_packages
    - ${{ if containsValue(parameters.artifacts, 'publish') }}:
      - output: pipelineArtifact
        displayName: Publish CLI
        path: $(publish_dir)
        artifact: drop_cli

  steps:
    - template: /eng/ci/templates/steps/setup-dependencies.yml@self
      parameters:
        sign: ${{ parameters.sign }}

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: custom
        custom: restore
        projects: ${{ parameters.projects }}
        arguments: -v m ${{ parameters.build_args }}

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: ${{ parameters.projects }}
        arguments: -c ${{ parameters.configuration }} -v m --no-restore ${{ parameters.build_args }}

    - task: DotNetCoreCLI@2
      displayName: Unit tests
      inputs:
        command: test
        projects: ${{ parameters.projects }}
        arguments: -c ${{ parameters.configuration }} --no-build ${{ parameters.build_args }}

    - ${{ if and(containsValue(parameters.artifacts, 'pack'), eq(parameters.sign, true)) }}:
      # Only sign the intermediate DLLs if we are packing.
      # For publishing, we'll sign the final apphost binaries, which is sufficient for code integrity and more performant than signing every DLL.
      - template: ci/sign-files.yml@eng
        parameters:
          displayName: Sign assemblies
          minimatch: true
          signType: dll
          folderPath: out/bin
          pattern: |
            **/Azure.Functions.Cli*.dll
            !**/Azure.Functions.Cli*Test.dll
            !**/Azure.Functions.Cli*Tests.dll

    - ${{ if containsValue(parameters.artifacts, 'pack') }}:
      - task: DotNetCoreCLI@2
        displayName: Pack
        inputs:
          command: custom
          custom: pack
          projects: ${{ parameters.projects }}
          arguments: -c ${{ parameters.configuration }} -v m -o $(pack_dir) --no-build ${{ parameters.build_args }}

    - ${{ if containsValue(parameters.artifacts, 'publish') }}:
      - task: DotNetCoreCLI@2
        displayName: Publish All Runtimes
        inputs:
          command: custom
          custom: build
          projects: ${{ parameters.projects }}
          arguments: -c ${{ parameters.configuration }} -v m --no-restore -t:PublishAllRids -p:AllRuntimesPublishRoot=$(publish_dir) ${{ parameters.build_args }}

    - ${{ if and(containsValue(parameters.artifacts, 'pack'), eq(parameters.sign, true)) }}:
      - template: ci/sign-files.yml@eng
        parameters:
          displayName: Sign nuget packages
          signType: nuget
          folderPath: $(pack_dir)
          pattern: '*.nupkg'

    - ${{ if and(containsValue(parameters.artifacts, 'publish'), eq(parameters.sign, true)) }}:
      - template: /eng/ci/templates/steps/sign-app.yml@self
        parameters:
          platform: windows
          folderPath: $(publish_dir)
          signPatterns: '**/win-*/func'

      - template: /eng/ci/templates/steps/sign-app.yml@self
        parameters:
          platform: linux
          folderPath: $(publish_dir)
          signPatterns: '**/linux-*/func'

      # macOS hardened runtime requires every loaded Mach-O (apphost + native
      # dylibs) to be signed. ESRP's MacAppDeveloperSign requires the payload
      # to be a .zip or .dmg, so we zip each osx-* rid folder, sign the zips,
      # then expand them back over the publish output.
      - pwsh: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path '$(publish_dir)' '_macsign'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Get-ChildItem -Path '$(publish_dir)' -Directory -Filter 'osx-*' | ForEach-Object {
            $zip = Join-Path $stage "$($_.Name).zip"
            Compress-Archive -Path (Join-Path $_.FullName '*') -DestinationPath $zip -Force
            Write-Host "Zipped $($_.Name) -> $zip"
          }
        displayName: 'Package macOS runtimes for signing'

      - template: /eng/ci/templates/steps/sign-app.yml@self
        parameters:
          platform: macos
          folderPath: $(publish_dir)/_macsign
          signPatterns: 'osx-*.zip'

      - pwsh: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path '$(publish_dir)' '_macsign'
          Get-ChildItem -Path $stage -Filter 'osx-*.zip' | ForEach-Object {
            $rid = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
            $dest = Join-Path '$(publish_dir)' $rid
            Remove-Item -Recurse -Force -Path $dest -ErrorAction SilentlyContinue
            Expand-Archive -Path $_.FullName -DestinationPath $dest -Force
            Write-Host "Restored signed $rid"
          }
          Remove-Item -Recurse -Force -Path $stage
        displayName: 'Restore signed macOS runtimes'
