jobs:
- job: OSX_E2E_Test
  timeoutInMinutes: '180'
  displayName: 'E2E Test:'

  pool:
    name: Azure Pipelines
    image: macOS-latest
    os: macOS

  strategy:
    matrix:
      dotnetIsolated_osx_x64:
        languageWorker: 'DotnetIsolated'
        runtime: 'osx-x64'
      node_osx_x64:
        languageWorker: 'Node'
        runtime: 'osx-x64'
      powershell_osx_x64:
        languageWorker: 'Powershell'
        runtime: 'osx-x64'
      python_osx_x64:
        languageWorker: 'Python'
        runtime: 'osx-x64'
      custom_osx_x64:
        languageWorker: 'Custom'
        runtime: 'osx-x64'
      go_osx_x64:
        languageWorker: 'Go'
        runtime: 'osx-x64'

  steps:
  - pwsh: ./eng/scripts/start-emulators.ps1
    displayName: 'Start emulators (NoWait)'

  - bash: |
      set -e
      brew install go
      # Microsoft-hosted macOS-latest agents are Intel; brew puts the go symlink at
      # /usr/local/bin/go (Apple Silicon would be /opt/homebrew/bin). Prepend both
      # so this works regardless of which agent we land on.
      echo "##vso[task.prependpath]/usr/local/bin"
      echo "##vso[task.prependpath]/opt/homebrew/bin"
      echo "PATH after install: $PATH"
      which go
      go version
    displayName: 'Install Go'

  - bash: |
      echo "PATH at test start: $PATH"
      which go || echo "ERROR: go not on PATH"
      go version || echo "ERROR: go version failed"
    displayName: 'Diagnose Go availability'

  - script: |
      sudo chown -R $(id -u):$(id -g) ~/.npm
      npm install -g @azure/functions
    displayName: 'Install @azure/functions'

  - template: /eng/ci/templates/steps/install-tools.yml@self

  - template: /eng/ci/templates/steps/restore-nuget.yml@self

  - pwsh: |
      dotnet publish src/Cli/func/Azure.Functions.Cli.csproj `
      -c Release `
      -f net8.0 `
      -r $(runtime) `
      --self-contained `
      -o $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)
    displayName: 'Publish CLI ($(runtime))'

  - bash: |
      chmod +x $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)/func
      chmod +x $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)/gozip
    displayName: 'Make CLI binaries executable'

  - pwsh: |
      Write-Host "PATH right before test run (pwsh): $env:PATH"
      $goCmd = Get-Command go -ErrorAction SilentlyContinue
      if ($goCmd) {
        Write-Host "go resolved to: $($goCmd.Source)"
        & go version
      } else {
        Write-Host "ERROR: go not found by pwsh Get-Command"
      }
      Write-Host "ls /usr/local/bin/go*:"
      Get-ChildItem /usr/local/bin/go* -ErrorAction SilentlyContinue | Format-List
    displayName: 'Diagnose Go availability (pre-test, pwsh)'

  - template: /eng/ci/templates/steps/run-e2e-tests.yml@self
    parameters:
      worker: $(languageWorker)
      runtime: $(runtime)