jobs:
- job: OSX_E2E_Test
  timeoutInMinutes: '180'
  displayName: 'E2E Test:'

  pool:
    name: Azure Pipelines
    image: macOS-latest
    os: macOS

  strategy:
    matrix:
      dotnetIsolated_osx_x64:
        languageWorker: 'DotnetIsolated'
        runtime: 'osx-x64'
      node_osx_x64:
        languageWorker: 'Node'
        runtime: 'osx-x64'
      powershell_osx_x64:
        languageWorker: 'Powershell'
        runtime: 'osx-x64'
      python_osx_x64:
        languageWorker: 'Python'
        runtime: 'osx-x64'
      custom_osx_x64:
        languageWorker: 'Custom'
        runtime: 'osx-x64'
      go_osx_x64:
        languageWorker: 'Go'
        runtime: 'osx-x64'

  steps:
  - pwsh: ./eng/scripts/start-emulators.ps1
    displayName: 'Start emulators (NoWait)'

  - script: |
      sudo chown -R $(id -u):$(id -g) ~/.npm
      npm install -g @azure/functions
    displayName: 'Install @azure/functions'

  - template: /eng/ci/templates/steps/install-tools.yml@self

  # On macOS, GoTool@0 (in install-tools.yml) is skipped because it only
  # ships an amd64 Go binary, which can't run on Apple Silicon agents.
  # Install an arm64-native Go via Homebrew, pinned to the same major.minor
  # (1.24) used by GoTool@0 on Linux/Windows, so all three OSes test against
  # a consistent Go version.
  - bash: |
      set -euo pipefail
      brew install go@1.24
      GO_BIN="$(brew --prefix go@1.24)/bin"
      echo "##vso[task.prependpath]$GO_BIN"
      "$GO_BIN/go" version
    displayName: 'Install Go 1.24 (Homebrew, arm64-native)'

  - template: /eng/ci/templates/steps/restore-nuget.yml@self

  - pwsh: |
      dotnet publish src/Cli/func/Azure.Functions.Cli.csproj `
      -c Release `
      -f net8.0 `
      -r $(runtime) `
      --self-contained `
      -o $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)
    displayName: 'Publish CLI ($(runtime))'

  - bash: |
      chmod +x $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)/func
      chmod +x $(Build.ArtifactStagingDirectory)/artifacts/$(runtime)/gozip
    displayName: 'Make CLI binaries executable'

  - template: /eng/ci/templates/steps/run-e2e-tests.yml@self
    parameters:
      worker: $(languageWorker)
      runtime: $(runtime)