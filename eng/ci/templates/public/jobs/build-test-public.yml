parameters:
  artifactTargetFramework: ''
  jobTitle: ''
  tfm: ''

jobs:
- job: ${{ parameters.jobTitle }}
  timeoutInMinutes: "180"
  pool:
    name: 1es-pool-azfunc-public
    image: 1es-windows-2022
    os: windows

  variables:
    devops_buildNumber: $[counter(format(''), 1500)]
    DEVOPS_REPO_BRANCH: $[coalesce(variables['System.PullRequest.TargetBranch'], variables['Build.SourceBranchName'])]
    DEVOPS_REPO_COMMIT: $(Build.SourceVersion)
  steps:
  - pwsh: . "tools/start-emulators.ps1" -NoWait
    displayName: "Start emulators (NoWait)"
  - pwsh: |
      $isIntegrationBuild = $false
      if ($env:INTEGRATIONBUILDNUMBER -like "PreRelease*-*")
      {
          $isIntegrationBuild = $true
      }
      Write-Host "##vso[task.setvariable variable=IsIntegrationBuild]$isIntegrationBuild"
      Write-Host "IsIntegrationBuild: $isIntegrationBuild"
    displayName: 'Set IsIntegrationBuild variable'
  - pwsh: |
      Write-Host "Target branch: '$(DEVOPS_REPO_BRANCH)'"
    displayName: Set up environment variables
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
  - pwsh: |
      Import-Module ".\pipelineUtilities.psm1" -Force
      Install-Dotnet
    displayName: 'Install .NET 6.0 and 3.1'
  - task: NuGetToolInstaller@1
    inputs:
      versionSpec:
    displayName: Install Nuget tool
  - pwsh: |
      .\validateWorkerVersions.ps1
    displayName: 'Validate worker versions'
  - task: PowerShell@2
    displayName: "Run Check Vulnerabilities Script"
    inputs:
      filePath: '$(Build.SourcesDirectory)/check-vulnerabilities.ps1'
      workingDirectory: '$(Build.SourcesDirectory)'
  - pwsh: |
      .\build.ps1
    env:
      BuildArtifactsStorage: $(BuildArtifactsStorage)
      ArtifactTargetFramework: ${{ parameters.artifactTargetFramework }}
      IsReleaseBuild: false
      IsPublicBuild: true
      IsCodeqlBuild: false
    displayName: 'Executing build script'
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '**/*.trx'
      failTaskOnFailedTests: true
    condition: succeededOrFailed()
  templateContext:
    outputs:
    - output: pipelineArtifact
      path: 'test/Azure.Functions.Cli.Tests/bin/Debug/${{ parameters.tfm }}/ZippedOnWindows.zip'
      artifact: ${{ parameters.jobTitle }}_ZippedOnWindows

- job: ${{ parameters.jobTitle }}_Test_Linux
  timeoutInMinutes: "180"
  pool:
    name: 1es-pool-azfunc-public
    image: 1es-ubuntu-24.04-min
    os: 'linux'
  steps:
  - bash: |
      sudo apt-get update
      sudo apt-get install -y npm golang
      npm --version
      go version
      # Install .NET 8.0 SDK to /usr/share/dotnet so all SDKs are in one location
      curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
      chmod +x dotnet-install.sh
      ./dotnet-install.sh --install-dir /usr/share/dotnet --channel 8.0
      echo "##vso[task.prependpath]/usr/share/dotnet"
      /usr/share/dotnet/dotnet --version
    displayName: 'Install npm, Go, and .NET'
  - pwsh: |
      Import-Module ".\pipelineUtilities.psm1" -Force
      Install-Dotnet
    displayName: 'Install .NET 6.0 and 3.1'
  - download: current
    displayName: 'Download test zip'
    artifact: ${{ parameters.jobTitle }}_ZippedOnWindows
  - script: |
      sudo apt-get update
      sudo apt-get -y install fuse-zip
    displayName: 'Install fuse-zip'
  - task: DotNetCoreCLI@2
    inputs:
      command: 'test'
      projects: '**/Azure.Functions.Cli.Tests.csproj'
      arguments: '--filter CreateZip_Succeeds'
    displayName: 'Run zip test'
  dependsOn: ${{ parameters.jobTitle }}