parameters:
- name: nugetConfigPath
  displayName: Path to the NuGet.Config file to patch (forwarded to replace-nuget-feed)
  type: string
  default: $(Build.SourcesDirectory)/NuGet.Config
- name: sign
  type: boolean
  default: false

steps:
- task: UseDotNet@2 # The pinned SDK we use to build
  displayName: Install .NET SDK from global.json
  inputs:
    packageType: sdk
    useGlobalJson: true

- ${{ if parameters.sign }}:
  - task: UseDotNet@2 # ESRP doesn't yet support net10 SDK
    displayName: Install .NET 9 SDK (for esrp tool)
    inputs:
      packageType: sdk
      version: 9.x

- ${{ if eq(variables['System.TeamProject'], 'internal') }}:
  - template: /eng/ci/templates/steps/replace-nuget-feed.yml@self
    parameters:
      nugetConfigPath: ${{ parameters.nugetConfigPath }}
