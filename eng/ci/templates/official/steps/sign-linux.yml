parameters:
- name: folderPath
  type: string
- name: signPatterns
  type: string
- name: keyCode
  type: string
  default: 'CP-450779-Pgp'

steps:
- template: ci/sign-files.yml@eng
  parameters:
    displayName: 'Linux signing (${{ parameters.keyCode }})'
    folderPath: '${{ parameters.folderPath }}'
    pattern: '${{ parameters.signPatterns }}'
    signType: inline
    inlineOperation: |
      [
        {
          "keyCode": "${{ parameters.keyCode }}",
          "operationSetCode": "LinuxSign",
          "parameters": [],
          "toolName": "sign",
          "toolVersion": "1.0"
        }
      ]