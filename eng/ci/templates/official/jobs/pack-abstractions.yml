jobs:
- job: PackAbstractions
  displayName: 'Pack Abstractions NuGet'
  timeoutInMinutes: 15

  pool:
    name: 1es-pool-azfunc
    image: 1es-windows-2022
    os: windows

  steps:
  - template: /eng/ci/templates/steps/install-tools.yml@self

  - template: /eng/ci/templates/steps/restore-nuget.yml@self

  - task: DotNetCoreCLI@2
    displayName: 'Pack Abstractions'
    inputs:
      command: 'pack'
      packagesToPack: 'src/Abstractions/Abstractions.csproj'
      configuration: 'Release'
      outputDir: '$(Build.ArtifactStagingDirectory)/nupkg'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish NuGet artifact'
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/nupkg'
      artifactName: 'abstractions-nupkg'
