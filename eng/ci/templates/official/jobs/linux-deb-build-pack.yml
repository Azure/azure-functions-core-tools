jobs:
- job: LinuxPackage
  timeoutInMinutes: "120"

  pool:
    name: 1es-pool-azfunc
    image: 1es-ubuntu-24.04-min
    os: linux

  variables:
    drop_path: $(Build.ArtifactStagingDirectory)
    pkg_drop_path: $(drop_path)/drop_debian
    pkg_drop_path_newkey: $(drop_path)/drop_debian_CP-500207-Pgp
    artifact_path: /mnt/vss/_work/1/s/eng/tools/publish-tools/artifact
    artifact_path_newkey: /mnt/vss/_work/1/s/eng/tools/publish-tools/artifact-CP-500207-Pgp

  templateContext:
    inputs:
    - input: pipelineArtifact
      pipeline: core-tools-consolidated-artifacts
      artifactName: func-cli-metadata-json
      targetPath: $(Pipeline.Workspace)/release-metadata

    outputParentDirectory: $(drop_path)
    outputs:
    - output: pipelineArtifact
      displayName: Publish debian package (legacy key)
      path: $(pkg_drop_path)
      artifact: drop_debian
    - output: pipelineArtifact
      displayName: Publish debian package (new key)
      path: $(pkg_drop_path_newkey)
      artifact: drop_debian_CP-500207-Pgp

  steps:
  - script: |
      sudo apt-get update
      sudo apt-get install -y binutils-aarch64-linux-gnu
      sudo apt-get install -y fakeroot
      sudo apt-get install -y python3-venv
    displayName: 'Install required tools'

  - task: PowerShell@2
    displayName: 'Read metadata from consolidated build'
    inputs:
      targetType: 'inline'
      script: |
        $metadataPath = "$(Pipeline.Workspace)/release-metadata/metadata.json"
        Write-Host "Reading metadata from $metadataPath"
        $metadata = Get-Content -Path $metadataPath | ConvertFrom-Json
        Write-Host "Consolidated Build ID: $($metadata.consolidatedBuildId)"
        Write-Host "Default Artifact Version: $($metadata.defaultArtifactVersion)"

        # Set as pipeline variables for later steps
        Write-Host "##vso[task.setvariable variable=ConsolidatedBuildId]$($metadata.consolidatedBuildId)"
        Write-Host "##vso[task.setvariable variable=DefaultArtifactVersion]$($metadata.defaultArtifactVersion)"

        # Set version as the build number
        Write-Host "##vso[build.updatebuildnumber]$($metadata.defaultArtifactVersion)"

  - task: Bash@3
    displayName: 'Build DEB package'
    inputs:
      targetType: 'inline'
      script: |
        # fail fast and make undefined vars an error
        set -euo pipefail

        cd eng/tools/publish-tools
        python3 -m venv publish-env
        source publish-env/bin/activate

        pip install -r requirements.txt
        pip install wget

        major_version=$(echo "$linuxBuildNumber" | cut -d'.' -f1)
        python driver.py "$linuxBuildNumber" "$consolidatedBuildId" "$major_version"
        python driver.py "$linuxBuildNumber" "$consolidatedBuildId"

        export DEB_PACKAGE="$(readlink -f artifact/*$RELEASE_VERSION*)"
        echo "${DEB_PACKAGE}"
      bashEnvValue: '~/.profile'  # Set value for BASH_ENV environment variable
    env:
      linuxBuildNumber: $(DefaultArtifactVersion)
      consolidatedBuildId: $(ConsolidatedBuildId)

  - task: Bash@3
    displayName: "Validate DEB architectures"
    inputs:
      targetType: 'inline'
      script: |
        chmod +x $(Build.SourcesDirectory)/eng/scripts/validate-deb-arch.sh
        bash $(Build.SourcesDirectory)/eng/scripts/validate-deb-arch.sh $(artifact_path)

  - task: Bash@3
    displayName: 'Copy artifacts for new key signing'
    inputs:
      targetType: 'inline'
      script: |
        set -euo pipefail
        mkdir -p $(artifact_path_newkey)
        cp -r $(artifact_path)/* $(artifact_path_newkey)/
        echo "Copied artifacts for new key signing:"
        ls -la $(artifact_path_newkey)/

  - task: UseDotNet@2
    displayName: 'Install .NET SDK'
    inputs:
      packageType: 'sdk'
      version: '8.x'

  # Sign with legacy key (CP-450779-Pgp) for Debian <=12, Ubuntu <=25.04, etc.
  - template: ci/sign-files.yml@eng
    parameters:
      displayName: 'Sign with legacy key (CP-450779-Pgp)'
      folderPath: '$(artifact_path)'
      pattern: '*.deb'
      signType: inline
      inlineOperation: |
        [
          {
            "keyCode": "CP-450779-Pgp",
            "operationSetCode": "LinuxSign",
            "parameters": [],
            "toolName": "signtool.exe",
            "toolVersion": "1.0"
          }
        ]

  # Sign with new key (CP-500207-Pgp) for Debian 13+, Ubuntu 25.10+, RHEL 10+, etc.
  - template: ci/sign-files.yml@eng
    parameters:
      displayName: 'Sign with new key (CP-500207-Pgp)'
      folderPath: '$(artifact_path_newkey)'
      pattern: '*.deb'
      signType: inline
      inlineOperation: |
        [
          {
            "keyCode": "CP-500207-Pgp",
            "operationSetCode": "LinuxSign",
            "parameters": [],
            "toolName": "signtool.exe",
            "toolVersion": "1.0"
          }
        ]

  - pwsh: |
      $buildTag = $env:LinuxPackageBuildTag
      $majorVersion = [math]::Floor([double]$buildTag.Split(".")[0])

      # Convert to Debian version format
      if ($buildTag -like "*-*") {
        $parts = $buildTag -split "-"
        $debianVersion = "$($parts[0])~$($parts[1])-1"
      } else {
        $debianVersion = "$buildTag-1"
      }

      foreach ($arch in @("x64", "arm64")) {
        $fileName = "azure-functions-core-tools_${debianVersion}_${arch}.deb"
        $fileNameMajor = "azure-functions-core-tools-$($majorVersion)_${debianVersion}_${arch}.deb"

        # Upload legacy-signed packages
        $filePath = "$env:ArtifactPath/$fileName"
        $filePathMajor = "$env:ArtifactPath/$fileNameMajor"
        az storage blob upload -f $filePath -c signed -n $fileName --account-name $env:LinuxPackageAccountName --account-key $env:LinuxPackageAccountKey
        az storage blob upload -f $filePathMajor -c signed -n $fileNameMajor --account-name $env:LinuxPackageAccountName --account-key $env:LinuxPackageAccountKey

        # Upload new-key-signed packages
        $filePathNew = "$env:ArtifactPathNewKey/$fileName"
        $filePathMajorNew = "$env:ArtifactPathNewKey/$fileNameMajor"
        az storage blob upload -f $filePathNew -c signed-CP-500207-Pgp -n $fileName --account-name $env:LinuxPackageAccountName --account-key $env:LinuxPackageAccountKey
        az storage blob upload -f $filePathMajorNew -c signed-CP-500207-Pgp -n $fileNameMajor --account-name $env:LinuxPackageAccountName --account-key $env:LinuxPackageAccountKey
      }
    env:
      LinuxPackageAccountName: $(LinuxPackageAccountName)
      LinuxPackageAccountKey: $(LinuxPackageAccountKey)
      LinuxPackageBuildTag: $(DefaultArtifactVersion)
      ArtifactPath: $(artifact_path)
      ArtifactPathNewKey: $(artifact_path_newkey)
    displayName: 'Upload Core Tools Signed Linux Packages to storage'
    condition: eq(variables['UploadSignedPackages'], 'true') # This is a UI variable that defaults to false

  - task: Bash@3
    displayName: 'Copy DEB packages to drop'
    inputs:
      targetType: 'inline'
      script: |
        mkdir -p $drop
        cp -r $ARTIFACT_PATH/* $drop

        mkdir -p $drop_newkey
        cp -r $ARTIFACT_PATH_NEWKEY/* $drop_newkey
    env:
      drop: $(pkg_drop_path)
      drop_newkey: $(pkg_drop_path_newkey)
      ARTIFACT_PATH: $(artifact_path)
      ARTIFACT_PATH_NEWKEY: $(artifact_path_newkey)
