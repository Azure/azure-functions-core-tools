parameters:
- name: projects
  type: string
- name: folder
  type: string
- name: public
  type: boolean
  default: false
- name: tagSpec
  # Optional. When set with a tagPrefix, the pipeline validates the queued
  # tag and parses it into ReleaseTagVersion / ReleaseTagChannel /
  # ReleaseTagSuffix pipeline variables. The wrapping release yml is
  # expected to map those to the workload's MSBuild props via build_args.
  # Shape: { tagPrefix: string, allowChannels: boolean (default true) }
  type: object
  default: {}
- name: build_args
  type: string
  default: ''

resources:
  repositories:
  - repository: 1es
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  - repository: eng
    type: git
    name: engineering
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1es
  parameters:
    pool:
      name: 1es-pool-azfunc
      image: 1es-ubuntu-24.04-min
      os: linux

    sdl:
      sourceAnalysisPool:
        name: 1es-pool-azfunc
        image: 1es-windows-2022
        os: windows
      codeql:
         runSourceLanguagesInSourceAnalysis: true

    stages:
    - stage: Validate
      jobs:
      - template: /eng/ci/templates/jobs/validate-release-ref.yml@self
        parameters:
          failOnInvalidRef: ${{ parameters.public }}
      - ${{ if parameters.tagSpec.tagPrefix }}:
        - template: /eng/ci/templates/jobs/validate-workload-tag.yml@self
          parameters:
            tagPrefix: ${{ parameters.tagSpec.tagPrefix }}
            ${{ if ne(parameters.tagSpec.allowChannels, false) }}:
              allowChannels: true
            ${{ else }}:
              allowChannels: false

    - stage: Build
      dependsOn: Validate
      variables:
      - template: /ci/variables/cfs.yml@eng

      jobs:
      - template: /eng/ci/templates/jobs/build.yml@self
        parameters:
          sign: true
          artifacts: ['pack']
          projects: ${{ parameters.projects }}
          tagSpec: ${{ parameters.tagSpec }}
          build_args: -p:IsReleaseCI=true ${{ parameters.build_args }}

    - stage: Release
      dependsOn: Build
      jobs:
      - template: /ci/release-nuget-package.yml@eng
        parameters:
          isProduction: true
          approvers: '[internal]\Azure Functions Core'
          artifact: drop_packages
          stagingFeed: public/pre-release
          packages: |
            **/*.nupkg
            !**/*.symbols.nupkg
          ${{ if eq(parameters.public, true) }}:
            partnerDrop:
              serviceConnection: azure-sdk-partner-drops
              targetFolder: azure-functions/${{ parameters.folder }}/$(Build.BuildNumber)
