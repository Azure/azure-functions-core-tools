resources:
  repositories:
  - repository: 1es
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  - repository: eng
    type: git
    name: engineering
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1es
  parameters:
    pool:
      name: 1es-pool-azfunc
      image: 1es-ubuntu-24.04-min
      os: linux

    sdl:
      sourceAnalysisPool:
        name: 1es-pool-azfunc
        image: 1es-windows-2022
        os: windows
      codeql:
         runSourceLanguagesInSourceAnalysis: true

    stages:
    - stage: Validate
      jobs:
      - template: /eng/ci/templates/jobs/validate-release-ref.yml@self

    - stage: Build
      dependsOn: Validate
      variables:
      - template: /ci/variables/cfs.yml@eng

      jobs:
      - template: /eng/ci/templates/jobs/build.yml@self
        parameters:
          sign: true
          artifacts: ['publish']
          projects: ${{ parameters.projects }}
          build_args: -p:IsReleaseCI=true

    - stage: Release
      dependsOn: Build
      jobs:
      - job: Approval
        timeoutInMinutes: 1440
        pool: server
        dependsOn: Build

        steps:
        - task: ManualValidation@1
          inputs:
            notifyUsers: '' # no notification
            approvers: '[internal]\Azure Functions Core'
            allowApproversToApproveTheirOwnRuns: false
            instructions: |
              Approve to release packages to:
                - staging feed 'public/pre-release' (universal artifacts)

      - template: /eng/ci/templates/jobs/stage-cli-artifacts.yml@self
        parameters:
          dependsOn: Approval

