parameters:
- name: skipBranchValidation
  displayName: Allow non-release source
  type: boolean
  default: false

resources:
  repositories:
  - repository: 1es
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  - repository: eng
    type: git
    name: engineering
    ref: refs/tags/release

variables:
- template: /ci/variables/cfs.yml@eng

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1es
  parameters:
    pool:
      name: 1es-pool-azfunc
      image: 1es-ubuntu-24.04-min
      os: linux

    sdl:
      sourceAnalysisPool:
        name: 1es-pool-azfunc
        image: 1es-windows-2022
        os: windows
      codeql:
         runSourceLanguagesInSourceAnalysis: true

    stages:
    - stage: Validate
      jobs:
      - template: /eng/ci/templates/jobs/validate-release-ref.yml@self
        parameters:
          skipBranchValidation: ${{ parameters.skipBranchValidation }}
  
    - stage: Build
      dependsOn: Validate

      jobs:
      - template: /eng/ci/templates/jobs/build.yml@self
        parameters:
          sign: false
          artifacts: ['publish']
          projects: |
            src/Func/Func.csproj
            test/Func.Tests/Func.Tests.csproj
          build_args: -p:IsReleaseCI=true

    - stage: Release
      dependsOn: ['Build', 'SDLSources']
      jobs:
      - template: /eng/ci/templates/jobs/stage-cli-artifacts.yml@self
        parameters:
          sign: true
