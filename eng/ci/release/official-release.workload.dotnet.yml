parameters:
- name: public
  displayName: Publish to nuget.org?
  type: boolean
  default: false

# Release has no triggers outside of pipeline
trigger: none
pr: none

extends:
  template: /eng/ci/templates/pipelines/release-packages.yml@self
  parameters:
    public: ${{ parameters.public }}
    folder: workload/dotnet
    projects: |
      $(Build.SourcesDirectory)/src/Workload/Stacks/DotNet/Workload.DotNet.csproj
      $(Build.SourcesDirectory)/test/Workload/Stacks/DotNet.Tests/Workload.DotNet.Tests.csproj
