parameters:
- name: public
  displayName: Publish to nuget.org?
  type: boolean
  default: false

# Release has no triggers outside of pipeline
trigger: none
pr: none

extends:
  template: /eng/ci/templates/pipelines/release-packages.yml@self
  parameters:
    public: ${{ parameters.public }}
    folder: workloads/python
    projects: |
      $(Build.SourcesDirectory)/src/Workloads/Stacks/Python/Workloads.Python.csproj
      $(Build.SourcesDirectory)/test/Workloads/Stacks/Python.Tests/Workloads.Python.Tests.csproj
