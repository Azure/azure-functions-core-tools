schedules:
- cron: "0 7 * * *"
  displayName: Nightly Build
  branches:
    include:
      - main
      - vnext
  always: true

trigger: none

pr:
  branches:
    include:
    - main
    - vnext
    - feature/*
    - release/*
  paths:
    include:
    - src/Abstractions/
    - src/Workload/Stacks/DotNet/
    - test/Workload/Stacks/DotNet.Tests/
    - eng/

resources:
  repositories:
  - repository: 1es
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1es
  parameters:
    pool:
      name: 1es-pool-azfunc-public
      image: 1es-ubuntu-24.04-min
      os: linux

    sdl:
      sourceAnalysisPool:
        name: 1es-pool-azfunc-public
        image: 1es-windows-2022
        os: windows

    settings:
      skipBuildTagsForGitHubPullRequests: ${{ variables['System.PullRequest.IsFork'] }}
      networkIsolationPolicy: Preferred, NuGet

    stages:
      - stage: Build
        jobs:
        - template: /eng/ci/templates/jobs/build-workload.yml@self
          parameters:
            WorkloadProjectName: DotNet
            sign: false
