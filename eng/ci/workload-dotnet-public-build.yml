trigger:
  branches:
    include:
    - main
    - vnext
    - feature/*
  paths:
    include:
    - src/Func.Cli.Abstractions/**
    - src/Func.Cli.Workload.Dotnet/**
    - test/Func.Cli.Workload.Dotnet.Tests/**
    - eng/ci/workload-dotnet-public-build.yml
    - eng/ci/templates/jobs/test-workload-dotnet.yml
    - eng/ci/templates/steps/run-workload-dotnet-tests.yml

pr:
  branches:
    include:
    - main
    - vnext
    - feature/*
  paths:
    include:
    - src/Func.Cli.Abstractions/**
    - src/Func.Cli.Workload.Dotnet/**
    - test/Func.Cli.Workload.Dotnet.Tests/**
    - eng/ci/workload-dotnet-public-build.yml
    - eng/ci/templates/jobs/test-workload-dotnet.yml
    - eng/ci/templates/steps/run-workload-dotnet-tests.yml

resources:
  repositories:
  - repository: 1es
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1es
  parameters:
    pool:
      name: 1es-pool-azfunc-public
      image: 1es-windows-2022
      os: windows
    sdl:
      codeql:
         compiled:
           enabled: true
         runSourceLanguagesInSourceAnalysis: true
    settings:
      skipBuildTagsForGitHubPullRequests: ${{ variables['System.PullRequest.IsFork'] }}

    stages:
      - stage: Test
        displayName: 'Build & Test Dotnet Workload'
        jobs:
        - template: /eng/ci/templates/jobs/test-workload-dotnet.yml@self
          parameters:
            name: Windows
            pool:
              name: 1es-pool-azfunc-public
              image: 1es-windows-2022
              os: windows
        - template: /eng/ci/templates/jobs/test-workload-dotnet.yml@self
          parameters:
            name: Linux
            pool:
              name: 1es-pool-azfunc-public
              image: 1es-ubuntu-24.04-min
              os: linux
