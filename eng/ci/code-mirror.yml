parameters:
- name: force
  displayName: Force push
  type: boolean
  default: false

trigger:
  branches:
    include:
    - main
    - vnext
    - feature/*
    - release/*

resources:
  repositories:
  - repository: eng
    type: git
    name: engineering
    ref: refs/tags/release

variables:
- template: ci/variables/cfs.yml@eng

extends:
  template: ci/code-mirror.yml@eng
  parameters:
    ${{ if parameters.force }}:
       extraPushArgs: --force
